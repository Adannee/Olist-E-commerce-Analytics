version: 2

models:
  - name: fct_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null

  - name: fct_product_performance
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: dim_customers
    columns:
      - name: customer_unique_id
        tests:
          - unique
          - not_null